# CodeFactor configuration
#
# Mirror the paths already excluded from SwiftLint analysis in .swiftlint.yml.
# Example/demo code and vendored sub-packages are intentionally not held to the
# library's lint standards (e.g. explicit_acl), so keep CodeFactor from flagging
# them.
#
# exclude_patterns use CodeFactor's single-`*` glob syntax (e.g. `src/blob/*`),
# NOT gitignore-style `**`. A trailing `/*` excludes every file in the folder.
# Also match the protobuf sources by extension anywhere they appear.
exclude_patterns:
  - "Examples/Sundial/Sources/Shared/Generated/*"
  - "*.pb.swift"
